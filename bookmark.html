<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <title>Quiz App</title>
</head>
<body>
  <header class="header">
    <h1 class="header__title">Quiz App</h1>
  </header>
  <main>
  <div class="card--list">
    <article class="card">
        <div class="card__header">
          <h1 class="card__question">Was ist weiss und rennt den Berg hoch?</h1>
            <i class="icon-bookmark-filled" data-js="bookmark-btn"></i>
        </div>
        <div class="card__main">
          <div class="btn--wrapper">
            <button class="btn btn--answer" data-js="answer-button">Show Answer</button>
          </div>
          <section class="card__answer" data-js="card-answer">
            <p class="answer">Eine Lawine mit Heimweh.</p>
          </section>
        </div>
        <div class="card__footer">
          <div class="footer__tag">#flachwitz</div>
          <div class="footer__tag">#nichtlustig</div>
          <div class="footer__tag">#lustig</div>          
        </div>
    </article>   
  </main>
  <footer class="footer">
    <nav class="footer__nav">
        <a class="nav__link" href="index.html"><span class="icon-home nav__icon"></span> </a>
          <a class="nav__link--selected" href="bookmark.html"><span class="icon-bookmark nav__icon--selected"></span> </a>
            <a class="nav__link" href="form.html"><span class="icon-plus-circle nav__icon"></span> </a>
              <a class="nav__link" href="profile.html"><span class="icon-user-profile nav__icon"></span> </a>
        
    </nav>
  </footer>  
</body>
</html>
