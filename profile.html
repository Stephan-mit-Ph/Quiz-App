<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
    <title>Quiz App</title>
</head>
<body>
  <header class="header">
    <h1 class="header__title">Quiz App</h1>
  </header>
  <main>
    <div class="card--list profile-card__list">
      <img
        class="profile-card__img"
        src="https://source.unsplash.com/random/300x300?portrait"
        alt="profile image"/>
      <h2 class="profile-card__name">Yar Pirate Ipsum</h2>
      <h3 class="profile-card__about">About me</h3>
      <p class="profile__bio">
        Prow scuttle parrel provost Sail ho shrouds spirits boom mizzenmast yardarm. 
        Pinnace holystone mizzenmast quarter crow's nest nipperkin grog yardarm hempen halter furl. 
      </p>
      <ul class="profile-card__icons">
        <li class="profile-card__icon">
          <i  class="icon-help-circle icon-question--profile"></i>
          <span>12</span>
        </li>
        <li class="profile-card__icon">
          <i class="icon-bookmark"></i>
          <span>4</span>
        </li>
      </ul>
      <h2 id="title">Settings</h2>
    <form class="profile__settings" aria-labelledby="title">
      <input
        type="checkbox"
        id="switch-darkmode"
        class="profile__settings-darkmode-input"
      />
      <label for="switch-darkmode" class="profile__settings-darkmode-label">Toggle Darkmode</label>
    </form>
  </div>
  </main>
  <footer class="footer">
    <nav class="footer__nav">
        <a class="nav__link" href="index.html"><span class="icon-home nav__icon"</span> </a>
          <a class="nav__link" href="bookmark.html"><span class="icon-bookmark nav__icon"</span> </a>
            <a class="nav__link" href="form.html"><span class="icon-plus-circle nav__icon"</span> </a>
              <a class="nav__link--selected" href="profile.html"><span class="icon-user-profile nav__icon--selected"</span> </a>
        
    </nav>
  </footer>  
</body>
</html>
